{{- if .Values.cdcReader.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: cdc-reader-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: cdc-reader
    {{- include "cdc.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DSN: "postgres://{{ .Values.postgresSource.credentials.user }}:{{ .Values.postgresSource.credentials.password }}@postgres-source:{{ .Values.postgresSource.port }}/{{ .Values.postgresSource.database }}"
{{- end }}
