{{- if .Values.orchestrator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: orchestrator
    {{- include "cdc.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "cdc.selectorLabels" "orchestrator" | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.orchestrator.port }}
      targetPort: {{ .Values.orchestrator.port }}
{{- end }}
