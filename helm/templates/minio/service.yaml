apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: minio
    {{- include "cdc.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "cdc.selectorLabels" "minio" | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.minio.ports.api }}
      targetPort: {{ .Values.minio.ports.api }}
      nodePort: {{ .Values.minio.service.apiNodePort }}
    - name: console
      port: {{ .Values.minio.ports.console }}
      targetPort: {{ .Values.minio.ports.console }}
      nodePort: {{ .Values.minio.service.consoleNodePort }}
