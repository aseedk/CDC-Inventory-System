{{- if .Values.inventorySync.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: inventory-sync-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: inventory-sync
    {{- include "cdc.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_TARGET_DSN: "postgres://{{ .Values.postgresTarget.credentials.user }}:{{ .Values.postgresTarget.credentials.password }}@postgres-target:{{ .Values.postgresTarget.port }}/{{ .Values.postgresTarget.database }}"
  MINIO_ACCESS_KEY: {{ .Values.minio.credentials.accessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.credentials.secretKey | quote }}
{{- end }}
