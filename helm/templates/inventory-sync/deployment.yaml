{{- if .Values.inventorySync.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-sync
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: inventory-sync
    {{- include "cdc.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cdc.selectorLabels" "inventory-sync" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cdc.selectorLabels" "inventory-sync" | nindent 8 }}
    spec:
      containers:
        - name: inventory-sync
          image: {{ .Values.inventorySync.image.repository }}:{{ .Values.inventorySync.image.tag }}
          imagePullPolicy: {{ .Values.inventorySync.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.inventorySync.port }}
          env:
            - name: REDPANDA_BROKERS
              value: "redpanda:{{ .Values.redpanda.ports.kafka }}"
            - name: SCHEMA_REGISTRY_URL
              value: "http://redpanda:{{ .Values.redpanda.ports.schemaRegistry }}"
            - name: CONSUMER_GROUP
              value: {{ .Values.inventorySync.consumerGroup | quote }}
            - name: MINIO_ENDPOINT
              value: "minio:{{ .Values.minio.ports.api }}"
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: ICEBERG_NAMESPACE
              value: {{ .Values.inventorySync.icebergNamespace | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.inventorySync.logLevel | quote }}
          envFrom:
            - secretRef:
                name: inventory-sync-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.inventorySync.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.inventorySync.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
{{- end }}
