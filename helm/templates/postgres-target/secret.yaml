apiVersion: v1
kind: Secret
metadata:
  name: postgres-target-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: postgres-target
    {{- include "cdc.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER:     {{ .Values.postgresTarget.credentials.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresTarget.credentials.password | quote }}
  POSTGRES_DB:       {{ .Values.postgresTarget.database | quote }}
