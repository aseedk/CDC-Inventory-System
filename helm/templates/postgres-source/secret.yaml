apiVersion: v1
kind: Secret
metadata:
  name: postgres-source-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: postgres-source
    {{- include "cdc.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER:     {{ .Values.postgresSource.credentials.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresSource.credentials.password | quote }}
  POSTGRES_DB:       {{ .Values.postgresSource.database | quote }}
