apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: grafana
    {{- include "cdc.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "cdc.selectorLabels" "grafana" | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.grafana.port }}
      targetPort: {{ .Values.grafana.port }}
      nodePort: {{ .Values.grafana.service.nodePort }}
