apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: grafana
    {{- include "cdc.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:{{ .Values.prometheus.port }}
        isDefault: true
        editable: false
      - name: PostgreSQL
        type: postgres
        url: postgres-target:{{ .Values.postgresTarget.port }}
        database: {{ .Values.postgresTarget.database }}
        user: {{ .Values.postgresTarget.credentials.user }}
        secureJsonData:
          password: {{ .Values.postgresTarget.credentials.password }}
        jsonData:
          sslmode: disable
          postgresVersion: 1600
        editable: false
