apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: grafana
    {{- include "cdc.labels" . | nindent 4 }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER:     {{ .Values.grafana.credentials.adminUser | quote }}
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.grafana.credentials.adminPassword | quote }}
