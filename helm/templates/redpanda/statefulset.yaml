apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: redpanda
    {{- include "cdc.labels" . | nindent 4 }}
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      {{- include "cdc.selectorLabels" "redpanda" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cdc.selectorLabels" "redpanda" | nindent 8 }}
    spec:
      containers:
        - name: redpanda
          image: {{ .Values.redpanda.image.repository }}:{{ .Values.redpanda.image.tag }}
          command:
            - rpk
            - redpanda
            - start
            - --mode=dev-container
            - --smp={{ .Values.redpanda.resources.smp }}
            - --memory={{ .Values.redpanda.resources.memory }}
            - --reserve-memory=0M
            - --overprovisioned
            - --node-id=0
            - --kafka-addr=internal://0.0.0.0:{{ .Values.redpanda.ports.kafka }},external://0.0.0.0:9093
            - --advertise-kafka-addr=internal://redpanda:{{ .Values.redpanda.ports.kafka }},external://localhost:9093
            - --schema-registry-addr=0.0.0.0:{{ .Values.redpanda.ports.schemaRegistry }}
            - --rpc-addr=0.0.0.0:{{ .Values.redpanda.ports.rpc }}
            - --advertise-rpc-addr=redpanda:{{ .Values.redpanda.ports.rpc }}
            - --default-log-level=info
          ports:
            - name: kafka
              containerPort: {{ .Values.redpanda.ports.kafka }}
            - name: schema-registry
              containerPort: {{ .Values.redpanda.ports.schemaRegistry }}
            - name: admin
              containerPort: {{ .Values.redpanda.ports.admin }}
            - name: rpc
              containerPort: {{ .Values.redpanda.ports.rpc }}
          livenessProbe:
            httpGet:
              path: /v1/status/ready
              port: {{ .Values.redpanda.ports.admin }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: {{ .Values.redpanda.ports.admin }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redpanda.storage.storageClass }}
        storageClassName: {{ .Values.redpanda.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redpanda.storage.size }}
