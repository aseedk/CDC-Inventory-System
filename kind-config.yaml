# kind-config.yaml — local Kubernetes cluster for the CDC Inventory Sync pipeline.
# Maps kind node (NodePort) ports to host ports so services are browser-accessible
# at the same URLs used by docker-compose (avoids reconfiguring clients).
#
# IMPORTANT: stop docker compose before creating this cluster to avoid port conflicts:
#   docker compose down
#   kind create cluster --config kind-config.yaml --name cdc

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
  - role: control-plane
    extraPortMappings:
      # Grafana
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # MinIO S3 API
      - containerPort: 30900
        hostPort: 9000
        protocol: TCP
      # MinIO web console
      - containerPort: 30901
        hostPort: 9001
        protocol: TCP
      # Redpanda Kafka
      - containerPort: 30092
        hostPort: 9092
        protocol: TCP
      # Redpanda Schema Registry
      - containerPort: 30084
        hostPort: 8084
        protocol: TCP
      # Redpanda Admin API
      - containerPort: 30644
        hostPort: 9644
        protocol: TCP
      # PostgreSQL source (external access only — Go services use ClusterIP)
      - containerPort: 30432
        hostPort: 5434
        protocol: TCP
      # PostgreSQL target
      - containerPort: 30433
        hostPort: 5433
        protocol: TCP
